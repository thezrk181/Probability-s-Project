<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}T20 Analytics{% endblock %} | ICC T20 Stats</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- ── Sidebar ───────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>T20<br>ANALYTICS</h1>
    <p>Spring 2026 · Fast Nuces</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Analysis</div>
    <a href="/"           class="nav-item {% if request.path == '/' %}active{% endif %}">
      <i data-lucide="layout-dashboard" class="nav-icon"></i><span>Dashboard</span>
    </a>
    <a href="/descriptive" class="nav-item {% if request.path == '/descriptive' %}active{% endif %}">
      <i data-lucide="bar-chart-3" class="nav-icon"></i><span>Descriptive</span>
    </a>
    <a href="/probability" class="nav-item {% if request.path == '/probability' %}active{% endif %}">
      <i data-lucide="dice-5" class="nav-icon"></i><span>Probability</span>
    </a>
    <a href="/regression"  class="nav-item {% if request.path == '/regression' %}active{% endif %}">
      <i data-lucide="line-chart" class="nav-icon"></i><span>Regression</span>
    </a>
    <div class="nav-label">Data</div>
    <a href="/rawdata"     class="nav-item {% if request.path == '/rawdata' %}active{% endif %}">
      <i data-lucide="database" class="nav-icon"></i><span>Raw Dataset</span>
    </a>
  </nav>
  <div class="sidebar-footer">v1.2.0 · Professional Edition</div>
</aside>

<!-- ── Main ──────────────────────────────────── -->
<main class="main">
  {% block content %}{% endblock %}
</main>

<script>
  // Initialize Lucide icons
  lucide.createIcons();
</script>

</body>
</html>
